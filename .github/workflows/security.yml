name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - working-directory: backend
        run: npm ci
      - working-directory: backend
        run: npm audit --audit-level=high

  dependency-audit-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm audit --audit-level=high

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-filesystem:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-filesystem.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload Trivy filesystem SARIF
        if: always() && hashFiles('trivy-filesystem.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-filesystem.sarif
          category: trivy-filesystem

  trivy-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t payment-gateway-backend:${{ github.sha }} ./backend
      - run: docker build --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:5000/api/v1 --build-arg NEXT_PUBLIC_RAZORPAY_KEY_ID=rzp_test_security_placeholder -t payment-gateway-frontend:${{ github.sha }} ./frontend
      - name: Trivy backend image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: payment-gateway-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload Trivy backend SARIF
        if: always() && hashFiles('trivy-backend.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
      - name: Trivy frontend image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: payment-gateway-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload Trivy frontend SARIF
        if: always() && hashFiles('trivy-frontend.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4
