name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: payment_gateway_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d payment_gateway_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      PORT: 5000
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: payment_gateway_test
      DB_TEST_NAME: payment_gateway_test
      DB_USER: test_user
      DB_PASSWORD: test_password
      JWT_SECRET: ci_test_jwt_secret_with_sufficient_length
      JWT_EXPIRES_IN: 1d
      RAZORPAY_KEY_ID: rzp_test_ci_placeholder
      RAZORPAY_KEY_SECRET: ci_test_key_secret_placeholder
      RAZORPAY_WEBHOOK_SECRET: ci_test_webhook_secret_placeholder
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: error
      LOG_TO_FILES: "false"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        run: npm ci
      - name: Wait for PostgreSQL
        run: |
          node -e "const { Client } = require('pg'); const wait = async () => { for (let i = 0; i < 30; i += 1) { const client = new Client({ host: process.env.DB_HOST, port: Number(process.env.DB_PORT), database: process.env.DB_NAME, user: process.env.DB_USER, password: process.env.DB_PASSWORD }); try { await client.connect(); await client.end(); return; } catch (error) { try { await client.end(); } catch (_) {} if (i === 29) throw error; await new Promise((resolve) => setTimeout(resolve, 1000)); } } }; wait();"
      - name: Run migrations
        run: npm run db:migrate
      - name: Check migration status
        run: npm run db:migrate:status
      - name: Run backend lint
        run: npm run lint
      - name: Run backend tests
        run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_ci_placeholder
      NEXT_PUBLIC_APP_NAME: Payment Gateway
      NEXT_PUBLIC_APP_ENV: ci
      NEXT_PUBLIC_APP_VERSION: ci
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - run: docker compose config
      - run: docker compose -f docker-compose.prod.yml --env-file .env.production.example config
      - run: docker build -t payment-gateway-backend:ci ./backend
      - run: docker build --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:5000/api/v1 --build-arg NEXT_PUBLIC_RAZORPAY_KEY_ID=rzp_test_ci_placeholder -t payment-gateway-frontend:ci ./frontend
