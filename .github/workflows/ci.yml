name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: payment_gateway_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d payment_gateway_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      PORT: 5000
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: payment_gateway_test
      DB_TEST_NAME: payment_gateway_test
      DB_USER: test_user
      DB_PASSWORD: test_password
      JWT_SECRET: test_jwt_secret_for_ci_only
      RAZORPAY_KEY_ID: rzp_test_ci_placeholder
      RAZORPAY_KEY_SECRET: ci_razorpay_secret_placeholder
      RAZORPAY_WEBHOOK_SECRET: ci_webhook_secret_placeholder
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run db:migrate:status
      - run: npm run lint
      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_ci_placeholder
      NEXT_PUBLIC_APP_NAME: Payment Gateway
      NEXT_PUBLIC_APP_ENV: ci
      NEXT_PUBLIC_APP_VERSION: ci
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - run: docker compose config
      - run: docker compose -f docker-compose.prod.yml --env-file .env.production.example config
      - run: docker build -t payment-gateway-backend:ci ./backend
      - run: docker build --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:5000/api/v1 --build-arg NEXT_PUBLIC_RAZORPAY_KEY_ID=rzp_test_ci_placeholder -t payment-gateway-frontend:ci ./frontend
