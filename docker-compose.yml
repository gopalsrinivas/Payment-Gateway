name: payment-gateway

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payment_gateway_demo}
      POSTGRES_USER: ${POSTGRES_USER:-gopal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gopal}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_VERSION: ${APP_VERSION:-local}
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-payment_gateway_demo}
      DB_USER: ${POSTGRES_USER:-gopal}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-gopal}
      JWT_SECRET: ${JWT_SECRET:-replace_with_long_random_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-replace_with_test_key_id}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-replace_with_test_key_secret}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-replace_with_webhook_secret}
      RAZORPAY_CURRENCY: ${RAZORPAY_CURRENCY:-INR}
      RAZORPAY_COMPANY_NAME: ${RAZORPAY_COMPANY_NAME:-Payment Gateway}
      RAZORPAY_CHECKOUT_DESCRIPTION: ${RAZORPAY_CHECKOUT_DESCRIPTION:-Test payment}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_TO_FILES: "false"
      TRUST_PROXY: ${TRUST_PROXY:-false}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5000/api/v1}
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID:-replace_with_test_key_id}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Payment Gateway}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-development}
        NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-local}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_net

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge
