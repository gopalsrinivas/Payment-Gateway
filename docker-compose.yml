services:
  postgres:
    image: postgres:16-alpine
    container_name: payment_gateway_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payment_gateway_demo}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace_with_database_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment_gateway_network

  backend:
    build:
      context: ./backend
    container_name: payment_gateway_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-payment_gateway_demo}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-replace_with_database_password}
      JWT_SECRET: ${JWT_SECRET:-replace_with_long_random_secret}
      JWT_EXPIRES_IN: 1d
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-replace_with_test_key_id}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-replace_with_test_key_secret}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-replace_with_webhook_secret}
      RAZORPAY_CURRENCY: ${RAZORPAY_CURRENCY:-INR}
      RAZORPAY_COMPANY_NAME: ${RAZORPAY_COMPANY_NAME:-Payment Gateway}
      RAZORPAY_CHECKOUT_DESCRIPTION: ${RAZORPAY_CHECKOUT_DESCRIPTION:-Test payment}
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-3000}
      LOG_LEVEL: info
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - payment_gateway_network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-5000}/api/v1
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-replace_with_test_key_id}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Payment Gateway}
    container_name: payment_gateway_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-5000}/api/v1
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-replace_with_test_key_id}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Payment Gateway}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - payment_gateway_network

volumes:
  postgres_data:

networks:
  payment_gateway_network:
    driver: bridge
