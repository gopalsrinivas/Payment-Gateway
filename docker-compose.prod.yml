name: payment-gateway-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - path: ./.env.production
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - db_net

  backend:
    image: ${BACKEND_IMAGE:-payment-gateway-backend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - path: ./.env.production
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      TRUST_PROXY: "true"
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - app_net
      - db_net

  frontend:
    image: ${FRONTEND_IMAGE:-payment-gateway-frontend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - app_net

  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/nginx/certs:/etc/nginx/certs:ro
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - app_net

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge
  db_net:
    driver: bridge
    internal: true
